name: Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # Skip if the last commit was a version bump (avoid infinite loop)
  check:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.guard.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version bump commit
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -q "^chore: bump version to"; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

  version-and-tag:
    needs: check
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump, commit, and push (with retry)
        id: bump
        run: |
          for ATTEMPT in 1 2 3; do
            echo "=== Attempt $ATTEMPT ==="
            # Always pull latest before reading version
            git pull --rebase origin main

            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            node -e "
              const pkg = require('./package.json');
              pkg.version = '$NEW_VERSION';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Bumping $CURRENT -> $NEW_VERSION"

            git add package.json
            git commit -m "chore: bump version to $NEW_VERSION"
            git tag "v$NEW_VERSION"

            if git push origin main --follow-tags; then
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
              echo "Published $NEW_VERSION"
              exit 0
            fi

            echo "Push failed, resetting and retrying..."
            git tag -d "v$NEW_VERSION"
            git reset --hard HEAD~1
          done
          echo "::error::Failed to push after 3 attempts"
          exit 1

  build:
    needs: version-and-tag
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            cross: true
          - os: macos-latest
            target: darwin-x64
            arch: x86_64
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: windows-latest
            target: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        shell: bash
        run: |
          TARGET_FLAG=""
          case "${{ matrix.target }}" in
            linux-x64)     TARGET_FLAG="--target=bun-linux-x64" ;;
            linux-arm64)   TARGET_FLAG="--target=bun-linux-arm64" ;;
            darwin-x64)    TARGET_FLAG="--target=bun-darwin-x64" ;;
            darwin-arm64)  TARGET_FLAG="--target=bun-darwin-arm64" ;;
            windows-x64)   TARGET_FLAG="--target=bun-windows-x64" ;;
          esac
          if [ "${{ matrix.target }}" = "windows-x64" ]; then
            bun build --compile $TARGET_FLAG src/cli.ts --outfile harnessctl-${{ matrix.target }}.exe
          else
            bun build --compile $TARGET_FLAG src/cli.ts --outfile harnessctl-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: harnessctl-${{ matrix.target }}
          path: harnessctl-${{ matrix.target }}*

  publish-github:
    needs: [version-and-tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version-and-tag.outputs.new_version }}"
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: [version-and-tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Bundle and publish
        run: |
          bun run bundle
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: [version-and-tag, publish-github]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.version-and-tag.outputs.new_version }}"
          gh api repos/mnvsk97/homebrew-tap/dispatches \
            -f event_type=update-harnessctl \
            -f "client_payload[version]=$VERSION"
