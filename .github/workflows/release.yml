name: Release (manual tag)

# This workflow handles manually pushed tags (e.g. for major/minor releases).
# For automatic patch releases on every merge to main, see publish.yml.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Skip if the tag was already created by publish.yml
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if automated tag
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -q "^chore: bump version to"; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping — tag was created by publish.yml"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            cross: true
          - os: macos-latest
            target: darwin-x64
            arch: x86_64
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: windows-latest
            target: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        shell: bash
        run: |
          TARGET_FLAG=""
          case "${{ matrix.target }}" in
            linux-x64)     TARGET_FLAG="--target=bun-linux-x64" ;;
            linux-arm64)   TARGET_FLAG="--target=bun-linux-arm64" ;;
            darwin-x64)    TARGET_FLAG="--target=bun-darwin-x64" ;;
            darwin-arm64)  TARGET_FLAG="--target=bun-darwin-arm64" ;;
            windows-x64)   TARGET_FLAG="--target=bun-windows-x64" ;;
          esac
          if [ "${{ matrix.target }}" = "windows-x64" ]; then
            bun build --compile $TARGET_FLAG src/cli.ts --outfile harnessctl-${{ matrix.target }}.exe
          else
            bun build --compile $TARGET_FLAG src/cli.ts --outfile harnessctl-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: harnessctl-${{ matrix.target }}
          path: harnessctl-${{ matrix.target }}*

  publish-github:
    needs: [check, build]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: [check, build]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Check if version exists on npm
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view harnessctl@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: |
          bun run bundle
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: [check, publish-github]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/mnvsk97/homebrew-tap/dispatches \
            -f event_type=update-harnessctl \
            -f "client_payload[version]=$VERSION"
